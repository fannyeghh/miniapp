<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Steam Top Up</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0b1220, #05070f);
      color: white;
      display: flex;
      justify-content: center;
      padding: 30px 15px;
      overflow-x: hidden;
    }

    .page {
      display: none;
      width: 100%;
      max-width: 420px;
      flex-direction: column;
      align-items: center;
    }

    .active {
      display: flex;
    }

    h1 {
      margin-bottom: 25px;
      text-align: center;
      text-shadow: 0 0 15px rgba(56,189,248,0.3);
    }

    .card {
      width: 100%;
      background: rgba(30, 41, 59, 0.6);
      padding: 22px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid rgba(56,189,248,0.15);
      box-shadow: 0 0 20px rgba(56,189,248,0.05);
      backdrop-filter: blur(10px);
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      outline: none;
      background: #0f172a;
      color: white;
      transition: 0.25s;
    }

    input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 12px rgba(56,189,248,0.25);
    }

    /* ❌ убираем стрелочки у number */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
    }

    .btn {
      margin-top: 10px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: linear-gradient(90deg, #38bdf8, #60a5fa);
      color: black;
      font-weight: bold;
      transition: 0.2s;
      box-shadow: 0 0 15px rgba(56,189,248,0.2);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(56,189,248,0.35);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .back {
      margin-top: 20px;
      color: #94a3b8;
      cursor: pointer;
      transition: 0.2s;
    }

    .back:hover {
      color: white;
    }

    .qr {
      width: 200px;
      height: 200px;
      background: white;
      border-radius: 12px;
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .info {
      margin-top: 10px;
      color: #94a3b8;
      text-align: center;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<!-- 🏠 ФОРМА -->
<div class="page active" id="home">

  <h1>Пополнение Steam</h1>

  <div class="card">

    <input id="login" type="text" placeholder="Логин Steam">

    <input id="amount" type="number" placeholder="Сумма">

    <button class="btn" onclick="goToPayment()">Оплата</button>

  </div>

</div>

<!-- 💳 ОПЛАТА -->
<div class="page" id="pay">

  <h1>Оплата</h1>

  <div class="qr">
    QR CODE<br>ЗАГЛУШКА
  </div>

  <div class="info" id="info"></div>

  <div class="back" onclick="openPage('home')">← Назад</div>

</div>

<script>
  function openPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function goToPayment() {
    const login = document.getElementById("login").value.trim();
    const amount = document.getElementById("amount").value.trim();

    if (!login || !amount) {
      showError("Заполни все поля для пополнения");
      return;
    }

    document.getElementById("info").innerText =
      `Логин: ${login}\nСумма: ${amount} ₽`;

    openPage('pay');
  }

  // ⚡ вместо alert (фикс блокировки ввода)
  function showError(text) {
    const old = document.getElementById("error");
    if (old) old.remove();

    const div = document.createElement("div");
    div.id = "error";
    div.innerText = text;

    div.style.position = "fixed";
    div.style.bottom = "20px";
    div.style.left = "50%";
    div.style.transform = "translateX(-50%)";
    div.style.background = "rgba(239,68,68,0.9)";
    div.style.color = "white";
    div.style.padding = "12px 18px";
    div.style.borderRadius = "10px";
    div.style.boxShadow = "0 0 15px rgba(239,68,68,0.4)";
    div.style.zIndex = "9999";

    document.body.appendChild(div);

    setTimeout(() => div.remove(), 2500);
  }
</script>

</body>
</html>
