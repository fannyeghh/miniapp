<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Steam Top Up</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 400px;
    }

    .option {
      background: #1e293b;
      padding: 18px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 1px solid transparent;
      user-select: none;
    }

    .option:hover {
      transform: translateY(-4px);
      background: #334155;
      border: 1px solid #38bdf8;
      box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
    }

    .option:active {
      transform: scale(0.97);
    }
  </style>
</head>

<body>

  <h1>Пополнение Steam</h1>

  <div class="container">

    <div class="option" onclick="openOption('https://example.com/topup1')">
      💳 Пополнение 300 ₽
    </div>

    <div class="option" onclick="openOption('https://example.com/topup2')">
      💳 Пополнение 500 ₽
    </div>

    <div class="option" onclick="openOption('https://example.com/topup3')">
      💳 Пополнение 1000 ₽
    </div>

  </div>

  <script>
    function openOption(url) {
      // можно заменить на Telegram WebApp действие
      window.open(url, "_blank");
    }
  </script>

</body>
</html>
