<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>EGH SHOP</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    body {
      margin: 0;
      font-family: 'Nunito', sans-serif;
      color: #e5e7eb;
      background: #020617;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* 🔥 БАННЕР КАК КАРТИНКА */
    .banner {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .banner img {
      width: 100%;
      max-width: 900px;
      border-radius: 18px;
    }

    .page {
      display: none;
      width: 100%;
      max-width: 420px;
      margin: auto;
      padding: 20px;
      flex-direction: column;
      align-items: center;
    }

    .active {
      display: flex;
    }

    h1 {
      font-weight: 800;
      letter-spacing: 1px;
    }

    .card {
      width: 100%;
      background: rgba(15, 23, 42, 0.7);
      padding: 22px;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(56,189,248,0.15);
    }

    input {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #020617;
      color: #e5e7eb;
      font-family: 'Nunito', sans-serif;
    }

    input:focus {
      border-color: #38bdf8;
      outline: none;
    }

    .btn {
      margin-top: 10px;
      padding: 13px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 800;
      background: linear-gradient(90deg, #38bdf8, #60a5fa);
      color: #020617;
    }

    .dropdown {
      position: relative;
      width: 100%;
    }

    .selected {
      background: #020617;
      border: 1px solid #334155;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
    }

    .options {
      position: absolute;
      width: 100%;
      background: #020617;
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 12px;
      max-height: 0;
      overflow: hidden;
      transition: 0.25s;
    }

    .dropdown.active .options {
      max-height: 200px;
    }

    .option {
      padding: 12px;
      cursor: pointer;
    }

    .option:hover {
      background: rgba(56,189,248,0.15);
    }

    .qr {
      width: 200px;
      height: 200px;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
      font-weight: bold;
    }

    .info {
      margin-top: 10px;
      color: #94a3b8;
      text-align: center;
      white-space: pre-line;
    }

    .back {
      margin-top: 20px;
      cursor: pointer;
      color: #94a3b8;
    }

    .error {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(239,68,68,0.9);
      padding: 12px 18px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- 🔥 КАРТИНКА ВМЕСТО БАННЕРА -->
<div class="banner">
  <img src="steam-banner.png" alt="Steam banner">
</div>

<!-- 🏠 HOME -->
<div class="page active" id="home">

  <h1>Пополнение Steam</h1>

  <div class="card">

    <input id="login" placeholder="Логин Steam">
    <input id="amount" type="number" placeholder="Сумма">

    <div class="dropdown" id="dropdown">
      <div class="selected" onclick="toggleDropdown()">RUB ₽</div>
      <div class="options">
        <div class="option" onclick="selectCurrency('RUB','₽')">RUB ₽</div>
        <div class="option" onclick="selectCurrency('KZT','₸')">KZT ₸</div>
      </div>
    </div>

    <button class="btn" onclick="pay()">Оплатить</button>

  </div>
</div>

<!-- 💳 PAY -->
<div class="page" id="pay">
  <h1>Оплата</h1>

  <div class="qr">QR CODE</div>

  <div class="info" id="info"></div>

  <div class="back" onclick="openPage('home')">← Назад</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let currency = "RUB";
let symbol = "₽";

function openPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function pay() {
  const login = document.getElementById("login").value.trim();
  const amount = document.getElementById("amount").value.trim();

  if (!login || !amount || amount <= 0) {
    showError("Проверь данные");
    return;
  }

  const data = { login, amount, currency };

  tg.sendData(JSON.stringify(data));

  document.getElementById("info").innerText =
    `Логин: ${login}\nСумма: ${amount} ${symbol}`;

  openPage('pay');
}

function toggleDropdown() {
  document.getElementById("dropdown").classList.toggle("active");
}

function selectCurrency(cur, sym) {
  currency = cur;
  symbol = sym;
  document.querySelector(".selected").innerText = cur + " " + sym;
  document.getElementById("dropdown").classList.remove("active");
}

function showError(text) {
  const div = document.createElement("div");
  div.className = "error";
  div.innerText = text;

  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2000);
}

document.addEventListener("click", function(e) {
  if (!document.getElementById("dropdown").contains(e.target)) {
    document.getElementById("dropdown").classList.remove("active");
  }
});

/* 🌊 ФОН (без мышки) */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){
  w=canvas.width=window.innerWidth;
  h=canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];

for(let i=0;i<40;i++){
  particles.push({
    x:Math.random()*w,
    y:Math.random()*h,
    vx:(Math.random()-0.5)*2,
    vy:(Math.random()-0.5)*2,
    size:Math.random()*200+100
  });
}

function draw(){
  ctx.clearRect(0,0,w,h);

  for(let p of particles){
    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>w) p.vx*=-1;
    if(p.y<0||p.y>h) p.vy*=-1;

    let g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
    g.addColorStop(0,"rgba(56,189,248,0.25)");
    g.addColorStop(0.5,"rgba(14,165,233,0.15)");
    g.addColorStop(1,"transparent");

    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
