<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGH SHOP</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Nunito', sans-serif;
  color: #e5e7eb;
  overflow: hidden;
  background: #020617;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.banner {
  text-align: center;
  padding: 25px;
  font-size: 28px;
  font-weight: 800;
}

.page {
  display: none;
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.active { display: block; }

.card {
  background: rgba(15,23,42,0.7);
  padding: 20px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
}

input {
  width: 100%;
  margin-bottom: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #334155;
  background: #020617;
  color: white;
}

.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg,#38bdf8,#60a5fa);
  font-weight: 800;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="banner">EGH SHOP</div>

<div class="page active" id="home">
  <div class="card">
    <input id="login" placeholder="Логин Steam">
    <input id="amount" type="number" placeholder="Сумма">
    <button class="btn" onclick="pay()">Оплатить</button>
  </div>
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let w, h;
function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let particles = [];

for (let i = 0; i < 40; i++) {
  particles.push({
    x: Math.random() * w,
    y: Math.random() * h,
    vx: (Math.random() - 0.5) * 2,
    vy: (Math.random() - 0.5) * 2,
    size: Math.random() * 200 + 100
  });
}

function draw() {
  ctx.clearRect(0, 0, w, h);

  for (let p of particles) {
    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0 || p.x > w) p.vx *= -1;
    if (p.y < 0 || p.y > h) p.vy *= -1;

    const gradient = ctx.createRadialGradient(
      p.x, p.y, 0,
      p.x, p.y, p.size
    );

    gradient.addColorStop(0, "rgba(56,189,248,0.25)");
    gradient.addColorStop(0.5, "rgba(14,165,233,0.15)");
    gradient.addColorStop(1, "transparent");

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

draw();

/* 💥 РЕАКЦИЯ НА КАСАНИЕ */
window.addEventListener("mousemove", (e) => {
  particles.push({
    x: e.clientX,
    y: e.clientY,
    vx: (Math.random() - 0.5) * 4,
    vy: (Math.random() - 0.5) * 4,
    size: 150
  });

  if (particles.length > 60) particles.shift();
});

/* Telegram */
const tg = window.Telegram.WebApp;
tg.expand();

function pay() {
  const login = document.getElementById("login").value;
  const amount = document.getElementById("amount").value;

  tg.sendData(JSON.stringify({login, amount}));
}
</script>

</body>
</html>
