<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>EGH SHOP</title>

  <!-- 🔥 ШРИФТ -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      margin: 0;
      font-family: 'Nunito', sans-serif;
      color: #e5e7eb;

      display: flex;
      flex-direction: column;
      align-items: center;

      background: linear-gradient(-45deg, #05070f, #0b1220, #0f172a, #0b1b2e);
      background-size: 400% 400%;
      animation: bgMove 12s ease infinite;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 🔥 БАННЕР */
    .banner {
      width: 100%;
      text-align: center;
      padding: 32px 20px;

      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;

      color: #e5e7eb;

      text-shadow:
        0 0 12px rgba(255,255,255,0.2),
        0 0 25px rgba(56,189,248,0.25);

      background: linear-gradient(90deg, #020409, #070b14, #020409);
      border-bottom: 1px solid rgba(56,189,248,0.15);
    }

    .page {
      display: none;
      width: 100%;
      max-width: 420px;
      flex-direction: column;
      align-items: center;
      margin-top: 25px;
    }

    .active {
      display: flex;
    }

    h1 {
      font-weight: 800;
      letter-spacing: 1px;

      text-shadow:
        0 0 8px rgba(255,255,255,0.15);
    }

    .card {
      width: 100%;
      background: rgba(30, 41, 59, 0.6);
      padding: 22px;
      border-radius: 18px;

      display: flex;
      flex-direction: column;
      gap: 12px;

      border: 1px solid rgba(56,189,248,0.15);
      box-shadow: 0 0 20px rgba(56,189,248,0.05);
      backdrop-filter: blur(10px);
    }

    input {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e5e7eb;

      font-family: 'Nunito', sans-serif;
    }

    input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 12px rgba(56,189,248,0.25);
      outline: none;
    }

    .btn {
      margin-top: 10px;
      padding: 13px;
      border: none;
      border-radius: 12px;
      cursor: pointer;

      font-weight: 800;
      font-family: 'Nunito', sans-serif;

      background: linear-gradient(90deg, #38bdf8, #60a5fa);
      color: #020617;

      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    /* 💱 ДРОПДАУН */
    .dropdown {
      position: relative;
      width: 100%;
    }

    .selected {
      background: #0f172a;
      border: 1px solid #334155;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
    }

    .options {
      position: absolute;
      top: 110%;
      width: 100%;

      background: rgba(15, 23, 42, 0.98);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 14px;

      max-height: 0;
      overflow: hidden;
      opacity: 0;

      transition: 0.25s;
    }

    .dropdown.active .options {
      max-height: 200px;
      opacity: 1;
    }

    .option {
      padding: 12px;
      cursor: pointer;
    }

    .option:hover {
      background: rgba(56,189,248,0.15);
      color: #38bdf8;
    }

    .qr {
      width: 200px;
      height: 200px;
      background: white;
      border-radius: 12px;

      display: flex;
      align-items: center;
      justify-content: center;

      color: black;
      font-weight: bold;
    }

    .info {
      margin-top: 10px;
      color: #94a3b8;
      text-align: center;
      white-space: pre-line;
    }

    .back {
      margin-top: 20px;
      cursor: pointer;
      color: #94a3b8;
    }

    .error {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);

      background: rgba(239,68,68,0.9);
      padding: 12px 18px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="banner">EGH SHOP</div>

<div class="page active" id="home">

  <h1>Пополнение Steam</h1>

  <div class="card">

    <input id="login" placeholder="Логин Steam">
    <input id="amount" type="number" placeholder="Сумма">

    <div class="dropdown" id="dropdown">
      <div class="selected" onclick="toggleDropdown()">RUB ₽</div>
      <div class="options">
        <div class="option" onclick="selectCurrency('RUB','₽')">RUB ₽</div>
        <div class="option" onclick="selectCurrency('KZT','₸')">KZT ₸</div>
      </div>
    </div>

    <button class="btn" onclick="pay()">Оплатить</button>

  </div>
</div>

<div class="page" id="pay">
  <h1>Оплата</h1>

  <div class="qr">QR CODE</div>

  <div class="info" id="info"></div>

  <div class="back" onclick="openPage('home')">← Назад</div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  let currency = "RUB";
  let symbol = "₽";

  function openPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function pay() {
    const login = document.getElementById("login").value.trim();
    const amount = document.getElementById("amount").value.trim();

    if (!login || !amount || amount <= 0) {
      showError("Проверь данные");
      return;
    }

    const data = { login, amount, currency };

    tg.sendData(JSON.stringify(data));

    document.getElementById("info").innerText =
      `Логин: ${login}\nСумма: ${amount} ${symbol}`;

    openPage('pay');
  }

  function toggleDropdown() {
    document.getElementById("dropdown").classList.toggle("active");
  }

  function selectCurrency(cur, sym) {
    currency = cur;
    symbol = sym;

    document.querySelector(".selected").innerText = cur + " " + sym;
    document.getElementById("dropdown").classList.remove("active");
  }

  function showError(text) {
    const div = document.createElement("div");
    div.className = "error";
    div.innerText = text;

    document.body.appendChild(div);
    setTimeout(() => div.remove(), 2000);
  }

  document.addEventListener("click", function(e) {
    if (!document.getElementById("dropdown").contains(e.target)) {
      document.getElementById("dropdown").classList.remove("active");
    }
  });
</script>

</body>
</html>
