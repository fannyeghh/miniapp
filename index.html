<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>

  <title>EGH SHOP - Пополнение Steam</title>

  <!-- ШРИФТ -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">

  <!-- Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #1a1a3e, #24243e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Анимированный фон */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      animation: float 20s infinite;
    }

    .orb-1 { width: 300px; height: 300px; background: rgba(56, 189, 248, 0.15); top: -100px; left: -100px; }
    .orb-2 { width: 400px; height: 400px; background: rgba(139, 92, 246, 0.1); bottom: -150px; right: -150px; animation-delay: -5s; }
    .orb-3 { width: 200px; height: 200px; background: rgba(236, 72, 153, 0.1); top: 50%; left: 50%; animation-delay: -10s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    /* Дождь из ключей */
    .rain-key {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      user-select: none;
      opacity: 0;
    }
    
    .rain-key img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 5px rgba(56,189,248,0.4));
    }

    /* Кнопка админ-панели */
    .admin-btn {
      position: fixed;
      top: 70px;
      right: 15px;
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #1e1b4b, #2e1a3e);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      border: 1px solid rgba(56, 189, 248, 0.5);
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
      transition: all 0.3s ease;
      font-size: 22px;
      backdrop-filter: blur(10px);
    }

    .admin-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.6);
    }

    /* Модальное окно админ-панели */
    .admin-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      overflow-y: auto;
    }

    .admin-modal.active {
      display: block;
    }

    .admin-modal-content {
      max-width: 500px;
      margin: 50px auto;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 24px;
      padding: 20px;
      border: 1px solid rgba(56, 189, 248, 0.3);
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    .admin-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(56, 189, 248, 0.2);
    }

    .admin-modal-header h2 {
      font-size: 20px;
      color: #38bdf8;
    }

    .close-modal {
      background: none;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: 0.2s;
    }

    .close-modal:hover {
      background: rgba(255,255,255,0.1);
    }

    .order-card {
      background: rgba(15, 23, 42, 0.8);
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 15px;
      border-left: 3px solid #38bdf8;
    }

    .order-info p {
      margin: 8px 0;
      font-size: 13px;
      color: #cbd5e1;
    }

    .order-info strong {
      color: #fff;
    }

    .order-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .confirm-btn {
      background: linear-gradient(90deg, #22c55e, #16a34a);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      flex: 1;
    }

    .reject-btn {
      background: linear-gradient(90deg, #ef4444, #dc2626);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      flex: 1;
    }

    .order-status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
    }

    .status-pending { background: #f59e0b; color: #000; }
    .status-completed { background: #22c55e; color: #fff; }
    .status-rejected { background: #ef4444; color: #fff; }

    /* Баннер */
    .banner {
      width: 100%;
      text-align: center;
      padding: 20px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 2px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(56,189,248,0.2);
      position: relative;
      z-index: 10;
    }

    /* Страницы */
    .page {
      display: none;
      width: 100%;
      max-width: 400px;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      position: relative;
      z-index: 10;
    }

    .active {
      display: flex;
    }

    /* Картинка Steam */
    .steam-image {
      text-align: center;
      margin: 10px 0 20px;
      width: 100%;
    }

    .steam-image img {
      max-width: 85%;
      height: auto;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
    }

    /* Карточка */
    .card {
      width: 100%;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(15px);
      padding: 24px;
      border-radius: 24px;
      border: 1px solid rgba(56, 189, 248, 0.2);
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      margin-bottom: 12px;
    }

    input:focus {
      border-color: #38bdf8;
      outline: none;
    }

    input[type="number"] {
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Дропдаун */
    .dropdown {
      position: relative;
      width: 100%;
      margin-bottom: 12px;
    }

    .selected {
      background: #0f172a;
      border: 1px solid #334155;
      padding: 14px;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }

    .selected::after {
      content: "▼";
      font-size: 12px;
      color: #94a3b8;
    }

    .options {
      position: absolute;
      top: 110%;
      left: 0;
      right: 0;
      background: #1e293b;
      border-radius: 14px;
      max-height: 0;
      overflow: hidden;
      transition: 0.3s;
      z-index: 100;
    }

    .dropdown.active .options {
      max-height: 150px;
    }

    .option {
      padding: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .option:hover {
      background: #334155;
      color: #38bdf8;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-weight: 800;
      font-size: 16px;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      color: #fff;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 5px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .qr {
      width: 200px;
      height: 200px;
      background: white;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px auto;
      color: #000;
      font-weight: bold;
    }

    .info {
      background: rgba(0,0,0,0.4);
      padding: 15px;
      border-radius: 14px;
      text-align: center;
      font-size: 14px;
      margin: 15px 0;
    }

    .back {
      text-align: center;
      cursor: pointer;
      color: #94a3b8;
      padding: 10px;
      transition: 0.2s;
    }

    .back:hover {
      color: #38bdf8;
    }

    .error {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #ef4444;
      padding: 12px 20px;
      border-radius: 50px;
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(100%);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* Загрузка */
    .loading {
      text-align: center;
      padding: 20px;
      color: #94a3b8;
    }

    /* Адаптив */
    @media (max-width: 480px) {
      .banner { font-size: 18px; padding: 15px; }
      .card { padding: 18px; }
      .admin-btn { top: 60px; right: 10px; width: 40px; height: 40px; font-size: 18px; }
    }
  </style>
</head>

<body>

<div class="bg-animation">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- Кнопка админ-панели -->
<div id="adminBtn" class="admin-btn" style="display: none;" onclick="openAdminPanel()">
  👑
</div>

<!-- Модалка админ-панели -->
<div id="adminModal" class="admin-modal">
  <div class="admin-modal-content">
    <div class="admin-modal-header">
      <h2>📋 Управление заказами</h2>
      <button class="close-modal" onclick="closeAdminPanel()">×</button>
    </div>
    <div id="ordersList">
      <div class="loading">Загрузка заказов...</div>
    </div>
  </div>
</div>

<div class="banner">⚡ EGH SHOP ⚡</div>

<!-- Главная страница -->
<div class="page active" id="home">
  <div class="steam-image">
    <img src="image.png" alt="Steam Пополнение" draggable="false">
  </div>
  <div class="card">
    <input type="text" id="login" placeholder="🔑 Логин Steam" autocomplete="off">
    <input type="number" id="amount" placeholder="💰 Сумма" step="1" min="1">
    
    <div class="dropdown" id="dropdown">
      <div class="selected" onclick="toggleDropdown()">RUB ₽</div>
      <div class="options">
        <div class="option" onclick="selectCurrency('RUB','₽')">RUB ₽</div>
        <div class="option" onclick="selectCurrency('KZT','₸')">KZT ₸</div>
      </div>
    </div>
    
    <button class="btn" onclick="pay()">💳 ОПЛАТИТЬ</button>
  </div>
</div>

<!-- Страница оплаты -->
<div class="page" id="pay">
  <h2 style="margin-bottom: 15px;">💸 Ожидание оплаты</h2>
  <div class="qr">💳 QR-код</div>
  <div class="info" id="info"></div>
  <div class="back" onclick="openPage('home')">← Назад в магазин</div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.enableClosingConfirmation();

  let currency = "RUB";
  let symbol = "₽";
  
  // Текущий пользователь
  const currentUser = tg.initDataUnsafe?.user || {};
  const ADMIN_ID = 1641610032;
  const isAdmin = currentUser && currentUser.id === ADMIN_ID;

  // Показываем кнопку админа
  if (isAdmin) {
    document.getElementById('adminBtn').style.display = 'flex';
  }

  // Сохраняем текущий заказ для отслеживания статуса
  let currentOrderId = null;

  function openPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function pay() {
    const login = document.getElementById("login").value.trim();
    const amount = document.getElementById("amount").value.trim();

    if (!login) {
      showError("❌ Введите логин Steam");
      return;
    }
    if (!amount || amount <= 0) {
      showError("❌ Введите корректную сумму");
      return;
    }

    currentOrderId = Date.now();

    const orderData = {
      action: 'new_order',
      order_id: currentOrderId,
      login: login,
      amount: parseFloat(amount),
      currency: currency,
      symbol: symbol,
      user_id: currentUser.id,
      username: currentUser.username || currentUser.first_name || 'Пользователь',
      timestamp: new Date().toLocaleString(),
      status: 'pending'
    };

    // Отправляем боту
    tg.sendData(JSON.stringify(orderData));

    // Показываем информацию
    document.getElementById("info").innerHTML = `
      🧑 Покупатель: @${orderData.username}<br>
      🎮 Логин: ${login}<br>
      💵 Сумма: ${amount} ${symbol}<br>
      📊 Статус: <span style="color: #f59e0b;">⏳ Ожидает подтверждения</span><br><br>
      После оплаты ожидайте подтверждения от администратора.
    `;

    openPage('pay');
  }

  function toggleDropdown() {
    document.getElementById("dropdown").classList.toggle("active");
  }

  function selectCurrency(cur, sym) {
    currency = cur;
    symbol = sym;
    document.querySelector(".selected").innerHTML = `${cur} ${sym}`;
    document.getElementById("dropdown").classList.remove("active");
  }

  function showError(text) {
    const div = document.createElement("div");
    div.className = "error";
    div.innerHTML = text;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 2500);
  }

  // ========== АДМИН-ПАНЕЛЬ ==========
  function openAdminPanel() {
    if (!isAdmin) return;
    document.getElementById('adminModal').classList.add('active');
    loadOrders();
  }

  function closeAdminPanel() {
    document.getElementById('adminModal').classList.remove('active');
  }

  function loadOrders() {
    const ordersList = document.getElementById('ordersList');
    ordersList.innerHTML = '<div class="loading">📡 Загрузка заказов...</div>';
    
    // Запрашиваем заказы у бота
    tg.sendData(JSON.stringify({ action: 'get_orders' }));
  }

  function approveOrder(orderId) {
    tg.sendData(JSON.stringify({
      action: 'approve_order',
      order_id: orderId
    }));
  }

  function rejectOrder(orderId) {
    tg.sendData(JSON.stringify({
      action: 'reject_order',
      order_id: orderId
    }));
  }

  // Функции, которые вызываются из бота
  window.updateOrdersList = function(orders) {
    const ordersList = document.getElementById('ordersList');
    if (!orders || orders.length === 0) {
      ordersList.innerHTML = '<div style="text-align: center; padding: 40px;">📭 Нет активных заказов</div>';
      return;
    }

    ordersList.innerHTML = orders.map(order => `
      <div class="order-card">
        <div class="order-info">
          <p><strong>🆔 Заказ:</strong> #${order.order_id}</p>
          <p><strong>👤 Покупатель:</strong> @${order.username}</p>
          <p><strong>🎮 Логин Steam:</strong> ${order.login}</p>
          <p><strong>💰 Сумма:</strong> ${order.amount} ${order.symbol || '₽'}</p>
          <p><strong>💱 Валюта:</strong> ${order.currency}</p>
          <p><strong>📅 Время:</strong> ${order.timestamp}</p>
          <p><strong>📊 Статус:</strong> <span class="order-status status-pending">⏳ Ожидает</span></p>
        </div>
        ${order.status === 'pending' ? `
          <div class="order-actions">
            <button class="confirm-btn" onclick="approveOrder('${order.order_id}')">✅ Подтвердить</button>
            <button class="reject-btn" onclick="rejectOrder('${order.order_id}')">❌ Отклонить</button>
          </div>
        ` : ''}
      </div>
    `).join('');
  };

  window.updateOrderStatus = function(orderId, status, message, amount, symbol) {
    if (currentOrderId == orderId) {
      const statusText = status === 'completed' ? '✅ ВЫПОЛНЕН' : '❌ ОТКЛОНЁН';
      const statusColor = status === 'completed' ? '#22c55e' : '#ef4444';
      document.getElementById("info").innerHTML = `
        🧑 Ваш заказ #${orderId}<br>
        💵 Сумма: ${amount} ${symbol}<br>
        📊 Статус: <span style="color: ${statusColor}; font-weight: bold;">${statusText}</span><br><br>
        ${message}
      `;
    }
    showError(message);
  };

  // Закрытие дропдауна
  document.addEventListener("click", function(e) {
    const dropdown = document.getElementById("dropdown");
    if (dropdown && !dropdown.contains(e.target)) {
      dropdown.classList.remove("active");
    }
  });

  // Enter для отправки
  document.addEventListener("keypress", function(e) {
    if (e.key === "Enter" && document.getElementById("home").classList.contains("active")) {
      pay();
    }
  });

  // Запрет перетаскивания
  document.addEventListener('dragstart', (e) => e.preventDefault());

  // ========== ДОЖДЬ ИЗ КЛЮЧЕЙ ==========
  function createRainOfKeys() {
    const keyCount = 35;
    for(let i = 0; i < keyCount; i++) {
      const keyDiv = document.createElement('div');
      keyDiv.className = 'rain-key';
      const img = document.createElement('img');
      img.src = 'key.png';
      img.draggable = false;
      
      img.onerror = () => {
        keyDiv.innerHTML = '🔑';
        keyDiv.style.fontSize = size + 'px';
        keyDiv.style.display = 'flex';
        keyDiv.style.alignItems = 'center';
        keyDiv.style.justifyContent = 'center';
      };
      
      keyDiv.appendChild(img);
      const size = Math.random() * 40 + 25;
      keyDiv.style.width = size + 'px';
      keyDiv.style.height = size + 'px';
      keyDiv.style.left = Math.random() * 100 + '%';
      keyDiv.style.top = '-10%';
      
      const delay = Math.random() * 15;
      const duration = Math.random() * 5 + 4;
      const tilt = (Math.random() - 0.5) * 100;
      
      const animName = `rain_${i}`;
      const style = document.createElement('style');
      style.textContent = `
        @keyframes ${animName} {
          0% { transform: translate(0, -10vh) rotate(0deg); opacity: 0; }
          10% { opacity: 0.7; }
          90% { opacity: 0.7; }
          100% { transform: translate(${tilt}px, 110vh) rotate(${Math.random() * 360}deg); opacity: 0; }
        }
      `;
      document.head.appendChild(style);
      keyDiv.style.animation = `${animName} ${duration}s linear ${delay}s infinite`;
      document.body.appendChild(keyDiv);
    }
  }

  window.addEventListener('load', () => {
    setTimeout(createRainOfKeys, 100);
  });

  console.log('✅ EGH SHOP загружен');
  console.log(`👤 Пользователь: ${currentUser.username || currentUser.id}`);
  console.log(`👑 Админ: ${isAdmin ? 'ДА' : 'НЕТ'}`);
</script>

</body>
</html>
