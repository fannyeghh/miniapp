<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Steam Top Up</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 30px 15px;
    }

    .page {
      display: none;
      width: 100%;
      max-width: 420px;
      flex-direction: column;
      align-items: center;
    }

    .active {
      display: flex;
    }

    h1 {
      margin-bottom: 25px;
      text-align: center;
    }

    .card {
      width: 100%;
      background: #1e293b;
      padding: 20px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #0f172a;
      color: white;
      border: 1px solid #334155;
    }

    input:focus {
      border-color: #38bdf8;
    }

    .btn {
      margin-top: 10px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .back {
      margin-top: 20px;
      color: #94a3b8;
      cursor: pointer;
    }

    .qr {
      width: 200px;
      height: 200px;
      background: white;
      border-radius: 12px;
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
      font-weight: bold;
      text-align: center;
      padding: 10px;
    }

    .info {
      margin-top: 10px;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- 🏠 ФОРМА -->
<div class="page active" id="home">

  <h1>Пополнение Steam</h1>

  <div class="card">

    <input id="login" type="text" placeholder="Логин Steam">

    <input id="amount" type="number" placeholder="Сумма">

    <button class="btn" onclick="goToPayment()">Оплата</button>

  </div>

</div>

<!-- 💳 ОПЛАТА -->
<div class="page" id="pay">

  <h1>Оплата</h1>

  <div class="qr">
    QR CODE<br>ЗАГЛУШКА
  </div>

  <div class="info" id="info"></div>

  <div class="back" onclick="openPage('home')">← Назад</div>

</div>

<script>
  function openPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function goToPayment() {
    const login = document.getElementById("login").value;
    const amount = document.getElementById("amount").value;

    if (!login || !amount) {
      alert("Заполни все поля");
      return;
    }

    document.getElementById("info").innerText =
      `Логин: ${login}\nСумма: ${amount} ₽`;

    openPage('pay');
  }
</script>

</body>
</html>
