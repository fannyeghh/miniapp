<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Steam Top Up</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 30px 15px;
    }

    .page {
      display: none;
      width: 100%;
      max-width: 420px;
      flex-direction: column;
      align-items: center;
    }

    .active {
      display: flex;
    }

    h1 {
      margin-bottom: 25px;
      text-align: center;
    }

    .container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .option {
      background: #1e293b;
      padding: 18px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 1px solid transparent;
    }

    .option:hover {
      transform: translateY(-4px);
      background: #334155;
      border: 1px solid #38bdf8;
      box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
    }

    .back {
      margin-top: 20px;
      color: #94a3b8;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- 🏠 ГЛАВНАЯ -->
<div class="page active" id="home">

  <h1>Пополнение Steam</h1>

  <div class="container">

    <div class="option" onclick="openPage('page1')">
      💳 Пополнение 300 ₽
    </div>

    <div class="option" onclick="openPage('page2')">
      💳 Пополнение 500 ₽
    </div>

    <div class="option" onclick="openPage('page3')">
      💳 Пополнение 1000 ₽
    </div>

  </div>

</div>

<!-- 📄 300 -->
<div class="page" id="page1">
  <h1>Пополнение 300 ₽</h1>
  <p>Вы выбрали пакет на 300 рублей.</p>

  <div class="back" onclick="openPage('home')">← Назад</div>
</div>

<!-- 📄 500 -->
<div class="page" id="page2">
  <h1>Пополнение 500 ₽</h1>
  <p>Вы выбрали пакет на 500 рублей.</p>

  <div class="back" onclick="openPage('home')">← Назад</div>
</div>

<!-- 📄 1000 -->
<div class="page" id="page3">
  <h1>Пополнение 1000 ₽</h1>
  <p>Вы выбрали пакет на 1000 рублей.</p>

  <div class="back" onclick="openPage('home')">← Назад</div>
</div>

<script>
  function openPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
</script>

</body>
</html>
