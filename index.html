<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EGH SHOP</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;

      background: linear-gradient(-45deg,
        #05070f,
        #0b1220,
        #0f172a,
        #0b1b2e
      );
      background-size: 400% 400%;
      animation: bgMove 12s ease infinite;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 🔥 БАННЕР */
    .banner {
      width: 100%;
      text-align: center;
      padding: 22px;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 3px;

      /* ещё темнее фон */
      background: linear-gradient(90deg, #020409, #070b14, #020409);

      border-bottom: 1px solid rgba(56,189,248,0.15);

      box-shadow: 0 0 25px rgba(0,0,0,0.6);
      animation: glowBanner 3s ease-in-out infinite;
    }

    @keyframes glowBanner {
      0% { text-shadow: 0 0 5px rgba(56,189,248,0.2); }
      50% { text-shadow: 0 0 18px rgba(56,189,248,0.5); }
      100% { text-shadow: 0 0 5px rgba(56,189,248,0.2); }
    }

    .page {
      display: none;
      width: 100%;
      max-width: 420px;
      flex-direction: column;
      align-items: center;
      margin-top: 25px; /* ⬅ опустили ниже */
    }

    .active {
      display: flex;
    }

    h1 {
      margin-bottom: 20px;
      text-align: center;
      text-shadow: 0 0 15px rgba(56,189,248,0.3);
    }

    .card {
      width: 100%;
      background: rgba(30, 41, 59, 0.6);
      padding: 22px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid rgba(56,189,248,0.15);
      box-shadow: 0 0 20px rgba(56,189,248,0.05);
      backdrop-filter: blur(10px);
    }

    input, select {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      outline: none;
      background: #0f172a;
      color: white;
    }

    input:focus, select:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 12px rgba(56,189,248,0.25);
    }

    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
    }

    .btn {
      margin-top: 10px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: linear-gradient(90deg, #38bdf8, #60a5fa);
      color: black;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .back {
      margin-top: 20px;
      color: #94a3b8;
      cursor: pointer;
    }

    .qr {
      width: 200px;
      height: 200px;
      background: white;
      border-radius: 12px;
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
      font-weight: bold;
      text-align: center;
    }

    .info {
      margin-top: 10px;
      color: #94a3b8;
      text-align: center;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<!-- 🔥 БАННЕР -->
<div class="banner">
  EGH SHOP
</div>

<!-- 🏠 ФОРМА -->
<div class="page active" id="home">

  <h1>Пополнение Steam</h1>

  <div class="card">

    <input id="login" type="text" placeholder="Логин Steam">

    <input id="amount" type="number" placeholder="Сумма">

    <select id="currency">
      <option value="RUB">RUB ₽</option>
      <option value="KZ">KZ ₸</option>
    </select>

    <button class="btn" onclick="goToPayment()">Оплата</button>

  </div>

</div>

<!-- 💳 ОПЛАТА -->
<div class="page" id="pay">

  <h1>Оплата</h1>

  <div class="qr">
    QR CODE<br>ЗАГЛУШКА
  </div>

  <div class="info" id="info"></div>

  <div class="back" onclick="openPage('home')">← Назад</div>

</div>

<script>
  function openPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function goToPayment() {
    const login = document.getElementById("login").value.trim();
    const amount = document.getElementById("amount").value.trim();
    const currency = document.getElementById("currency").value;

    if (!login || !amount) {
      showError("Заполни все поля для пополнения");
      return;
    }

    const symbol = currency === "RUB" ? "₽" : "₸";

    document.getElementById("info").innerText =
      `Логин: ${login}\nСумма: ${amount} ${symbol}\nВалюта: ${currency}`;

    openPage('pay');
  }

  function showError(text) {
    const old = document.getElementById("error");
    if (old) old.remove();

    const div = document.createElement("div");
    div.id = "error";
    div.innerText = text;

    div.style.position = "fixed";
    div.style.bottom = "20px";
    div.style.left = "50%";
    div.style.transform = "translateX(-50%)";
    div.style.background = "rgba(239,68,68,0.9)";
    div.style.color = "white";
    div.style.padding = "12px 18px";
    div.style.borderRadius = "10px";
    div.style.zIndex = "9999";

    document.body.appendChild(div);

    setTimeout(() => div.remove(), 2500);
  }
</script>

</body>
</html>
