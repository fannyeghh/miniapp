<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>EGH SHOP - Пополнение Steam</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(-45deg, #05070f, #0b1220, #0f172a, #0b1b2e);
      background-size: 400% 400%;
      animation: bgMove 12s ease infinite;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow-x: hidden;
    }
    @keyframes bgMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .rain-key { position: fixed; pointer-events: none; z-index: 0; opacity: 0; }
    .rain-key img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 5px rgba(56,189,248,0.4)); }
    .admin-btn {
      position: fixed; top: 70px; right: 15px; width: 45px; height: 45px;
      background: linear-gradient(135deg, #1e1b4b, #2e1a3e); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100;
      border: 1px solid rgba(56,189,248,0.5); font-size: 22px; backdrop-filter: blur(10px);
    }
    .admin-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto;
    }
    .admin-modal.active { display: block; }
    .admin-modal-content {
      max-width: 500px; margin: 50px auto; background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 24px; padding: 20px; border: 1px solid rgba(56,189,248,0.3);
    }
    .admin-modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .admin-modal-header h2 { color: #38bdf8; }
    .close-modal { background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }
    .order-card { background: rgba(15,23,42,0.8); border-radius: 16px; padding: 15px; margin-bottom: 15px; border-left: 3px solid #38bdf8; }
    .order-info p { margin: 8px 0; font-size: 13px; color: #cbd5e1; }
    .order-actions { display: flex; gap: 10px; margin-top: 12px; }
    .confirm-btn { background: #22c55e; color: white; border: none; padding: 8px; border-radius: 10px; cursor: pointer; flex: 1; }
    .reject-btn { background: #ef4444; color: white; border: none; padding: 8px; border-radius: 10px; cursor: pointer; flex: 1; }
    .banner {
      width: 100%; text-align: center; padding: 32px 20px; font-size: 28px; font-weight: 800;
      color: #e5e7eb; background: linear-gradient(90deg, #020409, #070b14, #020409);
      border-bottom: 1px solid rgba(56,189,248,0.15); position: relative; z-index: 10;
    }
    .page { display: none; width: 100%; max-width: 420px; flex-direction: column; align-items: center; margin-top: 25px; position: relative; z-index: 10; }
    .active { display: flex; }
    .steam-image { text-align: center; margin: 20px 0; }
    .steam-image img { max-width: 90%; border-radius: 16px; box-shadow: 0 0 20px rgba(56,189,248,0.3); }
    .card { width: 100%; background: rgba(30,41,59,0.6); padding: 22px; border-radius: 18px; backdrop-filter: blur(10px); border: 1px solid rgba(56,189,248,0.15); }
    input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: #fff; margin-bottom: 12px; font-size: 16px; }
    input:focus { border-color: #38bdf8; outline: none; }
    input[type=number]::-webkit-inner-spin-button { display: none; }
    .dropdown { position: relative; width: 100%; margin-bottom: 12px; }
    .selected {
      background: linear-gradient(90deg, #020409, #070b14); border: 1px solid rgba(56,189,248,0.15);
      padding: 12px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between;
      color: #e5e7eb; font-weight: 600;
    }
    .options {
      position: absolute; top: 110%; left: 0; right: 0; background: linear-gradient(90deg, #020409, #070b14);
      border: 1px solid rgba(56,189,248,0.2); border-radius: 14px; max-height: 0; overflow: hidden; transition: 0.3s; z-index: 100;
    }
    .dropdown.active .options { max-height: 150px; }
    .option { padding: 12px; cursor: pointer; color: #e5e7eb; }
    .option:hover { background: rgba(56,189,248,0.15); color: #38bdf8; }
    .btn { width: 100%; padding: 13px; background: linear-gradient(90deg, #38bdf8, #60a5fa); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
    .qr { width: 200px; height: 200px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto; color: black; }
    .info { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; text-align: center; margin-top: 15px; color: #94a3b8; }
    .back { text-align: center; margin-top: 20px; cursor: pointer; color: #94a3b8; }
    .error { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #ef4444; padding: 12px 20px; border-radius: 50px; z-index: 1000; }
    @media (max-width: 480px) { .banner { font-size: 22px; } .admin-btn { top: 60px; width: 40px; height: 40px; font-size: 18px; } }
  </style>
</head>
<body>

<div id="adminBtn" class="admin-btn" style="display: none;" onclick="openAdminPanel()">👑</div>
<div id="adminModal" class="admin-modal">
  <div class="admin-modal-content">
    <div class="admin-modal-header"><h2>📋 Управление заказами</h2><button class="close-modal" onclick="closeAdminPanel()">×</button></div>
    <div id="ordersList">Загрузка...</div>
  </div>
</div>

<div class="banner">EGH SHOP</div>

<div class="page active" id="home">
  <div class="steam-image"><img src="image.png" draggable="false"></div>
  <div class="card">
    <input id="login" placeholder="Логин Steam">
    <input id="amount" type="number" placeholder="Сумма">
    <div class="dropdown" id="dropdown">
      <div class="selected" onclick="toggleDropdown()">RUB ₽</div>
      <div class="options">
        <div class="option" onclick="selectCurrency('RUB','₽')">RUB ₽</div>
        <div class="option" onclick="selectCurrency('KZT','₸')">KZT ₸</div>
      </div>
    </div>
    <button class="btn" onclick="pay()">Оплатить</button>
  </div>
</div>

<div class="page" id="pay">
  <h1 style="color:#fff">Оплата</h1>
  <div class="qr">QR CODE</div>
  <div class="info" id="info"></div>
  <div class="back" onclick="goBack()">← Назад</div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  
  let currency = "RUB", symbol = "₽", currentOrderId = null;
  const user = tg.initDataUnsafe?.user || { id: 0, username: "Guest" };
  const ADMIN_ID = 1641610032;
  const isAdmin = user.id === ADMIN_ID;
  
  let allOrders = JSON.parse(localStorage.getItem('egh_orders') || '{}');
  
  if (isAdmin) document.getElementById('adminBtn').style.display = 'flex';
  
  function goBack() { openPage('home'); }
  function openPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  
  function toggleDropdown() { document.getElementById("dropdown").classList.toggle("active"); }
  function selectCurrency(cur, sym) { currency = cur; symbol = sym; document.querySelector(".selected").innerHTML = `${cur} ${sym}`; document.getElementById("dropdown").classList.remove("active"); }
  
  function showError(text) {
    const div = document.createElement("div"); div.className = "error"; div.innerHTML = text;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 2500);
  }
  
  function pay() {
    const login = document.getElementById("login").value.trim();
    const amount = document.getElementById("amount").value.trim();
    if (!login || !amount || amount <= 0) { showError("Проверь данные"); return; }
    
    currentOrderId = Date.now();
    const orderData = {
      action: 'new_order', order_id: currentOrderId, login, amount: parseFloat(amount),
      currency, symbol, user_id: user.id, username: user.username || user.first_name || 'Пользователь',
      timestamp: new Date().toLocaleString(), status: 'pending'
    };
    
    allOrders[currentOrderId] = orderData;
    localStorage.setItem('egh_orders', JSON.stringify(allOrders));
    tg.sendData(JSON.stringify(orderData));
    
    document.getElementById("info").innerHTML = `🧑 @${orderData.username}<br>🎮 ${login}<br>💵 ${amount} ${symbol}<br><br>🟡 Ожидает подтверждения`;
    openPage('pay');
    tg.showPopup({ title: "✅ Заказ создан", message: `Заказ #${currentOrderId} на ${amount} ${symbol} отправлен!`, buttons: [{type:"ok"}] });
  }
  
  // АДМИН ПАНЕЛЬ
  function openAdminPanel() { if(!isAdmin) return; document.getElementById('adminModal').classList.add('active'); loadAdminOrders(); }
  function closeAdminPanel() { document.getElementById('adminModal').classList.remove('active'); }
  
  function loadAdminOrders() {
    const ordersList = document.getElementById('ordersList');
    const pending = Object.values(allOrders).filter(o => o.status === 'pending');
    if(pending.length === 0) { ordersList.innerHTML = '<div style="text-align:center;padding:40px">📭 Нет заказов</div>'; return; }
    ordersList.innerHTML = pending.map(order => `
      <div class="order-card">
        <div class="order-info"><p><strong>#${order.order_id}</strong> | @${order.username}</p><p>🎮 ${order.login}</p><p>💰 ${order.amount} ${order.symbol}</p><p>📅 ${order.timestamp}</p></div>
        <div class="order-actions"><button class="confirm-btn" onclick="approveOrder('${order.order_id}')">✅ Подтвердить</button><button class="reject-btn" onclick="rejectOrder('${order.order_id}')">❌ Отклонить</button></div>
      </div>
    `).join('');
  }
  
  function approveOrder(id) {
    const order = allOrders[id];
    if(!order) return;
    order.status = 'completed';
    localStorage.setItem('egh_orders', JSON.stringify(allOrders));
    tg.sendData(JSON.stringify({ action: 'approve_order', order_id: id, user_id: order.user_id, amount: order.amount, symbol: order.symbol, login: order.login }));
    loadAdminOrders();
    showError(`✅ Заказ #${id} подтверждён`);
    if(currentOrderId == id) document.getElementById("info").innerHTML = `✅ ЗАКАЗ ПОДТВЕРЖДЁН!<br>💰 ${order.amount} ${order.symbol}`;
  }
  
  function rejectOrder(id) {
    const order = allOrders[id];
    if(!order) return;
    order.status = 'rejected';
    localStorage.setItem('egh_orders', JSON.stringify(allOrders));
    tg.sendData(JSON.stringify({ action: 'reject_order', order_id: id, user_id: order.user_id, amount: order.amount, symbol: order.symbol }));
    loadAdminOrders();
    showError(`❌ Заказ #${id} отклонён`);
    if(currentOrderId == id) document.getElementById("info").innerHTML = `❌ ЗАКАЗ ОТКЛОНЁН<br>💸 Средства возвращены`;
  }
  
  document.addEventListener("click", function(e) { const d = document.getElementById("dropdown"); if(d && !d.contains(e.target)) d.classList.remove("active"); });
  document.addEventListener("keypress", e => { if(e.key === "Enter" && document.getElementById("home").classList.contains("active")) pay(); });
  document.addEventListener('dragstart', e => e.preventDefault());
  
  // ДОЖДЬ ИЗ КЛЮЧЕЙ
  function createRain() {
    for(let i=0;i<35;i++) {
      const k = document.createElement('div'); k.className = 'rain-key';
      const img = document.createElement('img'); img.src = 'key.png'; img.draggable = false;
      img.onerror = () => { k.innerHTML = '🔑'; k.style.fontSize = '30px'; };
      k.appendChild(img);
      const s = Math.random() * 40 + 25; k.style.width = s+'px'; k.style.height = s+'px';
      k.style.left = Math.random()*100+'%'; k.style.top = '-10%';
      const d = Math.random()*15, dur = Math.random()*5+4, tilt = (Math.random()-0.5)*100;
      const anim = `@keyframes r${i}{0%{transform:translate(0,-10vh) rotate(0deg);opacity:0}10%{opacity:0.7}90%{opacity:0.7}100%{transform:translate(${tilt}px,110vh) rotate(360deg);opacity:0}}`;
      const st = document.createElement('style'); st.textContent = anim; document.head.appendChild(st);
      k.style.animation = `r${i} ${dur}s linear ${d}s infinite`;
      document.body.appendChild(k);
    }
  }
  window.addEventListener('load', () => { setTimeout(createRain, 100); });
</script>
</body>
</html>
